<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 GHCP HackFest — Live Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">🎮</div>
            <h1>GHCP HackFest</h1>
            <!-- Classroom 이름 및 상태 (JS가 동적으로 채움) -->
            <p class="subtitle" id="classroom-title">GitHub Copilot Challenge</p>
            <span class="status-badge active" id="classroom-status-badge" style="display:inline-block;margin-bottom:12px"></span>
            <div class="status-bar">
                <span id="last-updated">업데이트 중...</span>
                <span class="dot" id="status-dot">●</span>
                <span id="auto-refresh">30초 후 새로고침</span>
            </div>
        </header>

        <!-- Classroom 전환 네비게이션 (복수 Classroom이 있을 때만 표시) -->
        <div class="classroom-nav" id="classroom-nav" style="display:none"></div>

        <!-- 미션 탭 (JS가 classrooms.json 기반으로 동적 생성) -->
        <div class="tabs" id="mission-tabs">
            <button class="tab active" data-mission="all" onclick="filterMission('all')">🏆 종합 순위</button>
        </div>

        <!-- 상위 3팀 포디움 -->
        <div class="podium" id="podium"></div>

        <!-- 전체 리더보드 테이블 -->
        <div class="leaderboard-container">
            <table class="leaderboard-table">
                <thead id="leaderboard-thead">
                    <tr>
                        <th class="rank-col">순위</th>
                        <th class="team-col">팀</th>
                        <th class="total-col">총점</th>
                        <th class="time-col">최근 제출</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="4" class="loading">⏳ 데이터 로딩 중...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 점수 범례 (JS가 동적으로 채움) -->
        <div class="legend">
            <h3>🏅 점수 체계</h3>
            <div class="legend-grid" id="legend-items">
                <!-- renderLegend()가 채움 -->
            </div>
        </div>
    </div>

    <!-- 점수 갱신 Toast 알림 -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
