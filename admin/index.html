<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackFest Admin</title>
    <style>
        :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text-muted:#7d8590;--primary:#238636;--primary-hover:#2ea043;--danger:#da3633;--danger-hover:#f85149;--warning:#d29922;--info:#1f6feb;--success:#3fb950;--radius:8px}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:400px}
        .login-card h1{font-size:22px;margin-bottom:6px}
        .login-card .subtitle{color:var(--text-muted);font-size:14px;margin-bottom:28px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:13px;margin-bottom:6px;color:var(--text-muted)}
        .form-group input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:14px;outline:none;transition:border-color .2s}
        .form-group input:focus{border-color:var(--info)}
        #login-error{color:var(--danger);font-size:13px;margin-top:10px;display:none}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:none;font-size:14px;cursor:pointer;transition:background .2s,opacity .2s;font-weight:500;text-decoration:none}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover:not(:disabled){background:var(--primary-hover)}
        .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover:not(:disabled){background:var(--danger-hover)}
        .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover:not(:disabled){background:var(--border)}
        .btn-full{width:100%;justify-content:center}.btn-sm{padding:4px 10px;font-size:12px}
        #dashboard{display:none}
        .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .topbar-left{display:flex;align-items:center;gap:12px}.topbar-title{font-weight:600;font-size:16px}
        .topbar-right{display:flex;align-items:center;gap:10px}
        .org-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text-muted)}
        .main-content{padding:24px;max-width:1200px;margin:0 auto}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
        .stat-value{font-size:28px;font-weight:700;margin-bottom:4px}.stat-label{font-size:12px;color:var(--text-muted)}
        .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
        .section-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .section-title{font-weight:600;font-size:15px}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th{text-align:left;padding:10px 12px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
        td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:rgba(255,255,255,.02)}
        .score-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
        .score-high{background:rgba(63,185,80,.2);color:var(--success)}.score-mid{background:rgba(210,153,34,.2);color:var(--warning)}
        .score-low{background:rgba(218,54,51,.2);color:var(--danger)}.score-zero{background:var(--surface2);color:var(--text-muted)}
        .mission-cell{display:flex;gap:6px;flex-wrap:wrap}
        .mission-tag{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text-muted)}
        .mission-tag.done{background:rgba(63,185,80,.15);color:var(--success)}
        .run-status{display:inline-flex;align-items:center;gap:5px;font-size:12px}
        .run-status.success{color:var(--success)}.run-status.failure{color:var(--danger)}.run-status.in_progress{color:var(--warning)}.run-status.queued{color:var(--text-muted)}
        #toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:14px;display:none;z-index:9999;max-width:350px}
        #toast.success{border-color:var(--success);color:var(--success)}#toast.error{border-color:var(--danger);color:var(--danger)}#toast.info{border-color:var(--info);color:#79c0ff}
        .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
        .overlay.active{display:flex}
        .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:440px;width:90%}
        .modal-box h3{margin-bottom:10px}.modal-box p{color:var(--text-muted);font-size:14px;margin-bottom:20px;line-height:1.5}
        .modal-box .note{color:var(--text-muted);font-size:13px;margin-bottom:16px;line-height:1.5}
        .modal-actions{display:flex;gap:10px;justify-content:flex-end}
        .actions-cell{display:flex;gap:6px}
        .write-lock{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:3px 10px}
        .write-lock.unlocked{color:var(--success);border-color:var(--success);background:rgba(63,185,80,.1)}
        .empty-state{text-align:center;padding:40px;color:var(--text-muted);font-size:14px}
        .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>&#x1F510; HackFest Admin</h1>
    <p class="subtitle">관리자 전용 대시보드입니다.</p>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn btn-primary btn-full" onclick="login()">로그인</button>
    <p id="login-error">비밀번호가 올바르지 않습니다.</p>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <span>&#x1F512;</span>
      <span class="topbar-title">HackFest Admin</span>
      <span class="org-badge">ghcp-hackfest</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-secondary btn-sm" onclick="refreshAll()">&#x21BB; 새로고침</button>
      <button class="btn btn-secondary btn-sm" onclick="downloadCSV()">&#x2193; CSV</button>
      <a class="btn btn-secondary btn-sm" href="https://ghcp-hackfest.github.io/hackfest-leaderboard/" target="_blank">리더보드 &#x2192;</a>
      <button class="btn btn-danger btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="main-content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="stat-teams">—</div><div class="stat-label">참가 팀 수</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-submissions">—</div><div class="stat-label">제출 횟수</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-m01-done">—</div><div class="stat-label">Mission 01 완료</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-m02-done">—</div><div class="stat-label">Mission 02 완료</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-avg">—</div><div class="stat-label">팀 평균 총점</div></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">&#x1F4CA; 팀 점수 현황</span>
      </div>
      <div id="scores-container"><div class="empty-state"><span class="spinner"></span></div></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">&#x2699; 최근 채점 실행 내역</span>
        <a class="btn btn-secondary btn-sm" href="https://github.com/ghcp-hackfest/hackfest-admin/actions" target="_blank">GitHub Actions &#x2192;</a>
      </div>
      <div id="runs-container"><div class="empty-state"><span class="spinner"></span></div></div>
    </div>
  </div>
</div>

<div id="confirm-overlay" class="overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-danger" id="modal-confirm-btn">확인</button>
    </div>
  </div>
</div>

<div id="token-overlay" class="overlay" onclick="closeTokenModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>&#x1F511; GitHub Token</h3>
    <p class="note">
      점수 삭제·재채점은 GitHub Token이 필요합니다.<br>
      권한: <code>repo</code> + <code>workflow</code><br>
      Token은 메모리에만 저장되며 페이지를 닫으면 삭제됩니다.
    </p>
    <div class="form-group">
      <input type="password" id="input-token" placeholder="github_pat_..." autocomplete="off" onkeydown="if(event.key==='Enter')submitToken()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTokenModal()">취소</button>
      <button class="btn btn-primary" onclick="submitToken()">확인</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const ORG='ghcp-hackfest',LB_REPO='hackfest-leaderboard',ADMIN_REPO='hackfest-admin';
const HASH_URL='https://raw.githubusercontent.com/'+ORG+'/'+LB_REPO+'/main/admin/password-hash.txt';
let ghToken='',scores={},allFiles=[],tokenCb=null;

async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

async function login(){
  const pw=document.getElementById('input-password').value;
  const err=document.getElementById('login-error');
  if(!pw)return;
  let stored;
  try{const r=await fetch(HASH_URL+'?t='+Date.now());stored=(await r.text()).trim();}
  catch{stored='8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918';}
  if(await sha256(pw)===stored){err.style.display='none';sessionStorage.setItem('hf_auth','1');showDashboard();}
  else{err.style.display='block';}
}

function logout(){sessionStorage.removeItem('hf_auth');ghToken='';document.getElementById('dashboard').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('input-password').value='';updateLock();}

function showDashboard(){document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block';refreshAll();}
async function refreshAll(){await Promise.all([loadScores(),loadRuns()]);}

async function loadScores(){
  const res=await ghFetch('https://api.github.com/repos/'+ORG+'/'+LB_REPO+'/contents/scores');
  if(!res.ok){document.getElementById('scores-container').innerHTML='<div class="empty-state">아직 채점된 점수가 없습니다.</div>';updateStats(0,0,0,0,0);return;}
  const files=await res.json();allFiles=files;scores={};
  const jf=files.filter(f=>f.name.endsWith('.json'));
  await Promise.all(jf.map(async f=>{
    const r=await ghFetch(f.url);if(!r.ok)return;
    const meta=await r.json();const c=JSON.parse(atob(meta.content));
    if(!scores[c.team])scores[c.team]={};
    scores[c.team][c.mission]={...c,fileSha:meta.sha,fileName:f.name};
  }));
  renderTable();
  const teams=Object.keys(scores),tots=teams.map(t=>(scores[t]['mission-01']?.score||0)+(scores[t]['mission-02']?.score||0));
  const avg=tots.length?Math.round(tots.reduce((a,b)=>a+b,0)/tots.length):0;
  updateStats(teams.length,jf.length,teams.filter(t=>scores[t]['mission-01']).length,teams.filter(t=>scores[t]['mission-02']).length,avg);
}

function renderTable(){
  const teams=Object.keys(scores).sort();
  if(!teams.length){document.getElementById('scores-container').innerHTML='<div class="empty-state">점수 데이터가 없습니다.</div>';return;}
  const rows=teams.map(t=>{
    const m01=scores[t]['mission-01'],m02=scores[t]['mission-02'],tot=(m01?.score||0)+(m02?.score||0);
    const cls=tot>=200?'score-high':tot>=100?'score-mid':tot>0?'score-low':'score-zero';
    const t01=m01?'<span class="mission-tag done">M01: '+m01.score+'점</span>':'<span class="mission-tag">M01: —</span>';
    const t02=m02?'<span class="mission-tag done">M02: '+m02.score+'점</span>':'<span class="mission-tag">M02: —</span>';
    const ts=[m01?.timestamp,m02?.timestamp].filter(Boolean).sort().pop();
    const dt=ts?new Date(ts).toLocaleString('ko-KR',{timeZone:'Asia/Seoul'}):'—';
    const tn=escHtml(t);
    return '<tr><td><strong>'+tn+'</strong></td><td><span class="score-badge '+cls+'">'+tot+'점</span></td>'
      +'<td><div class="mission-cell">'+t01+t02+'</div></td>'
      +'<td style="font-size:12px;color:var(--text-muted)">'+dt+'</td>'
      +'<td><div class="actions-cell">'
      +'<button class="btn btn-secondary btn-sm" onclick="requireToken(()=>triggerGrading(\''+tn+'\'))">&#x25BA; 재채점</button>'
      +'<button class="btn btn-danger btn-sm" onclick="requireToken(()=>confirmResetTeam(\''+tn+'\'))">&#x2715; 초기화</button>'
      +'</div></td></tr>';
  }).join('');
  document.getElementById('scores-container').innerHTML='<table><thead><tr><th>팀</th><th>총점</th><th>미션별</th><th>마지막 채점</th><th>액션</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function updateStats(teams,subs,m01,m02,avg){
  document.getElementById('stat-teams').textContent=teams;
  document.getElementById('stat-submissions').textContent=subs;
  document.getElementById('stat-m01-done').textContent=m01;
  document.getElementById('stat-m02-done').textContent=m02;
  document.getElementById('stat-avg').textContent=avg+'점';
}

async function loadRuns(){
  const res=await ghFetch('https://api.github.com/repos/'+ORG+'/'+ADMIN_REPO+'/actions/runs?per_page=15',ghToken);
  if(!res.ok){document.getElementById('runs-container').innerHTML='<div class="empty-state">토큰 입력 후 실행 내역을 볼 수 있습니다.</div>';return;}
  const data=await res.json(),runs=data.workflow_runs||[];
  if(!runs.length){document.getElementById('runs-container').innerHTML='<div class="empty-state">실행 내역이 없습니다.</div>';return;}
  const lm={success:'✅ 성공',failure:'❌ 실패',in_progress:'⏳ 진행중',queued:'��� 대기',cancelled:'⊘ 취소'};
  const rows=runs.map(r=>{
    const st=r.conclusion||r.status;
    const dur=r.updated_at?Math.round((new Date(r.updated_at)-new Date(r.created_at))/1000)+'s':'—';
    return '<tr><td style="font-size:12px;color:var(--text-muted)">'+r.id+'</td><td>'+escHtml(r.name||'')+'</td>'
      +'<td><span class="run-status '+st+'">'+(lm[st]||st)+'</span></td>'
      +'<td style="font-size:12px;color:var(--text-muted)">'+new Date(r.created_at).toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})+'</td>'
      +'<td style="font-size:12px;color:var(--text-muted)">'+dur+'</td>'
      +'<td><a class="btn btn-secondary btn-sm" href="'+r.html_url+'" target="_blank">로그 &#x2192;</a></td></tr>';
  }).join('');
  document.getElementById('runs-container').innerHTML='<table><thead><tr><th>ID</th><th>워크플로우</th><th>상태</th><th>실행 시각</th><th>소요</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function requireToken(cb){if(ghToken){cb();return;}tokenCb=cb;document.getElementById('token-overlay').classList.add('active');setTimeout(()=>document.getElementById('input-token').focus(),100);}
function promptToken(){tokenCb=null;document.getElementById('token-overlay').classList.add('active');setTimeout(()=>document.getElementById('input-token').focus(),100);}
function submitToken(){const t=document.getElementById('input-token').value.trim();if(!t)return;ghToken=t;document.getElementById('input-token').value='';closeTokenModal();updateLock();showToast('쓰기 권한 활성화됨','success');loadRuns();if(tokenCb){const cb=tokenCb;tokenCb=null;cb();}}
function closeTokenModal(){document.getElementById('token-overlay').classList.remove('active');}
function updateLock(){const e=document.getElementById('write-lock-badge');if(ghToken){e.textContent='��� 쓰기 활성';e.classList.add('unlocked');}else{e.textContent='��� 읽기 전용';e.classList.remove('unlocked');}}

async function triggerGrading(team){
  let ok=0;
  for(const repo of[team+'-mission-01',team+'-mission-02']){
    const r=await ghFetch('https://api.github.com/repos/'+ORG+'/'+repo+'/actions/workflows/grading.yml/dispatches',ghToken,'POST',{ref:'main'});
    if(r.status===204)ok++;
  }
  showToast(ok>0?team+': '+ok+'개 채점 트리거됨':'트리거 실패',ok>0?'success':'error');
  if(ok>0)setTimeout(loadRuns,3000);
}

function confirmResetTeam(t){openModal('"'+t+'" 초기화',t+' 팀의 모든 점수를 삭제합니다.',()=>resetTeam(t));}
function confirmResetAll(){openModal('전체 초기화','모든 팀 점수를 삭제합니다.',resetAll);}

async function resetTeam(team){
  let d=0;for(const m of Object.values(scores[team]||{}))if(await delFile(m.fileName,m.fileSha))d++;
  showToast(team+': '+d+'개 삭제됨',d>0?'success':'error');await loadScores();
}
async function resetAll(){
  let d=0;for(const f of allFiles.filter(f=>f.name.endsWith('.json'))){
    const r=await ghFetch(f.url,ghToken);if(!r.ok)continue;const m=await r.json();if(await delFile(f.name,m.sha))d++;
  }
  showToast(d+'개 파일 삭제됨','success');await loadScores();
}
async function delFile(name,sha){
  const r=await ghFetch('https://api.github.com/repos/'+ORG+'/'+LB_REPO+'/contents/scores/'+name,ghToken,'DELETE',{message:'admin: reset '+name,sha});
  return r.status===200;
}

function downloadCSV(){
  const teams=Object.keys(scores).sort();if(!teams.length){showToast('데이터 없음','error');return;}
  const rows=[['팀명','Mission01','Mission02','총점','마지막채점']];
  teams.forEach(t=>{const m1=scores[t]['mission-01']?.score||0,m2=scores[t]['mission-02']?.score||0;
    const ts=[scores[t]['mission-01']?.timestamp,scores[t]['mission-02']?.timestamp].filter(Boolean).sort().pop()||'';
    rows.push([t,m1,m2,m1+m2,ts]);});
  const blob=new Blob(['\uFEFF'+rows.map(r=>r.join(',')).join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'hackfest-'+new Date().toISOString().slice(0,10)+'.csv'});
  a.click();showToast('CSV 다운로드 완료','success');
}

async function ghFetch(url,token='',method='GET',body=null){
  const h={'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  if(token)h['Authorization']='token '+token;
  const o={method,headers:h};if(body)o.body=JSON.stringify(body);return fetch(url,o);
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let tt;function showToast(m,t='info'){const e=document.getElementById('toast');e.textContent=m;e.className=t;e.style.display='block';clearTimeout(tt);tt=setTimeout(()=>e.style.display='none',3500);}
function openModal(title,body,cb){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').textContent=body;document.getElementById('modal-confirm-btn').onclick=()=>{closeModal();cb();};document.getElementById('confirm-overlay').classList.add('active');}
function closeModal(){document.getElementById('confirm-overlay').classList.remove('active');}

window.addEventListener('DOMContentLoaded',()=>{if(sessionStorage.getItem('hf_auth')==='1')showDashboard();});
</script>
</body>
</html>
